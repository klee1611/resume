name: Compile CV, Resume, and Cover Letter

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            lmodern \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Compile documents
        run: make clean && make cv resume cover-letter

      - name: Upload compiled PDFs
        uses: actions/upload-artifact@v7
        with:
          name: cv-and-resume-pdfs
          path: |
            cv.pdf
            resume.pdf
            cover-letter.pdf
